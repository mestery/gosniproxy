name: Build and Test

once: build

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        tags: gosniproxy:test
        load: true
        cache-from: type=gha
        cache-to: type=gha

    - name: Verify Docker image
      run: |
        docker run --rm gosniproxy:test version 2>/dev/null || echo "Docker image built successfully"
